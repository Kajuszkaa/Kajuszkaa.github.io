<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Losowacz Customów LoL</title>
    <style>
        /* --- STYLIZACJA (CSS) --- */
        :root {
            /* Kolorystyka w stylu League of Legends (Hextech / Dark) */
            --bg-dark: #0a0a0c;
            --panel-bg: #1e2328;
            --border-color: #c8aa6e; /* Złoty / Hextech */
            --border-hover: #f0e6d2;
            --text-main: #f0e6d2;
            --text-muted: #a09b8c;
            --blue-team: #0ac8b9;
            --red-team: #e84057;
            --btn-bg: linear-gradient(to right, #c8aa6e, #8a6a32);
            --btn-hover: linear-gradient(to right, #f0e6d2, #c8aa6e);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            /* Subtelne tło z gradientem dla głębi */
            background-image: radial-gradient(circle at top, #1a1c23 0%, var(--bg-dark) 80%);
        }

        h1, h2, h3 {
            color: var(--border-color);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            max-width: 1200px;
            width: 100%;
        }

        .panel {
            background-color: var(--panel-bg);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #333;
            flex: 1;
            min-width: 320px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            position: relative;
            overflow: hidden;
        }

        /* Ozdobny pasek na górze panelu */
        .panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--btn-bg);
        }

        /* --- KROK 1: Pola tekstowe --- */
        .players-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .player-input-group {
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.3);
            border: 1px solid transparent;
            border-radius: 6px;
            padding: 5px 10px;
            transition: border-color 0.3s;
        }

        .player-input-group:focus-within {
            border-color: var(--border-color);
        }

        .player-input-group label {
            width: 35px;
            color: var(--border-color);
            font-weight: bold;
            font-size: 1.1rem;
        }

        .player-input-group input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 10px;
            font-size: 1rem;
            outline: none;
        }

        .player-input-group input::placeholder {
            color: #555;
        }

        /* --- Przyciski --- */
        .action-btn {
            width: 100%;
            background: var(--btn-bg);
            color: #010a13;
            border: none;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 6px;
            margin-top: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(200, 170, 110, 0.2);
        }

        .action-btn:hover {
            transform: translateY(-2px);
            background: var(--btn-hover);
            box-shadow: 0 6px 20px rgba(200, 170, 110, 0.4);
        }

        .action-btn:disabled {
            background: #333;
            color: #777;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* --- KROK 2,3,4: Tabele drużyn --- */
        .teams-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 20px;
        }

        .team-box {
            padding: 20px;
            border-radius: 10px;
            border: 2px solid transparent;
            background: rgba(0,0,0,0.2);
        }

        .team-blue {
            border-color: rgba(10, 200, 185, 0.3);
            box-shadow: inset 0 0 20px rgba(10, 200, 185, 0.05);
        }

        .team-blue h3 { color: var(--blue-team); }

        .team-red {
            border-color: rgba(232, 64, 87, 0.3);
            box-shadow: inset 0 0 20px rgba(232, 64, 87, 0.05);
        }

        .team-red h3 { color: var(--red-team); }

        .player-list {
            list-style: none;
        }

        .player-list li {
            background: rgba(255,255,255,0.03);
            margin-bottom: 8px;
            padding: 12px 15px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid transparent;
            transition: all 0.3s;
        }

        .team-blue .player-list li { border-left-color: var(--blue-team); }
        .team-red .player-list li { border-left-color: var(--red-team); }

        .player-name { 
            font-weight: 600; 
            font-size: 1.05rem; 
        }
        
        .player-details {
            text-align: right;
        }

        .player-role { 
            color: var(--border-color); 
            font-size: 0.9rem; 
            font-weight: bold;
            text-transform: uppercase;
        }

        .player-champ { 
            color: var(--text-muted); 
            font-style: italic; 
            font-size: 0.95rem;
            margin-left: 8px;
        }

        /* --- Stany i animacje --- */
        .hidden {
            display: none !important;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Komunikat startowy */
        .placeholder-msg {
            text-align: center;
            color: var(--text-muted);
            margin-top: 60px;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="container fade-in">
        <!-- LEWY PANEL - Wprowadzanie graczy -->
        <div class="panel">
            <h2>Krok 1: Gracze</h2>
            <div id="inputs-container" class="players-grid">
                <!-- Pola wygenerowane przez JavaScript -->
            </div>
            <button id="btn-teams" class="action-btn">Wylosuj Składy</button>
        </div>

        <!-- PRAWY PANEL - Wyniki -->
        <div class="panel">
            <h2>Wyniki Losowania</h2>
            
            <!-- Komunikat widoczny na start -->
            <div id="placeholder-msg" class="placeholder-msg">
                Wpisz nicki graczy po lewej stronie i kliknij <br>
                <strong style="color: var(--border-color);">"Wylosuj Składy"</strong>, <br>aby rozpocząć zabawę.
            </div>

            <!-- Kontener na wyniki (ukryty na start) -->
            <div id="results-area" class="hidden">
                <div class="teams-wrapper">
                    <!-- Niebieska drużyna -->
                    <div class="team-box team-blue">
                        <h3>Niebieska Drużyna</h3>
                        <ul id="blue-list" class="player-list"></ul>
                    </div>

                    <!-- Czerwona drużyna -->
                    <div class="team-box team-red">
                        <h3>Czerwona Drużyna</h3>
                        <ul id="red-list" class="player-list"></ul>
                    </div>
                </div>

                <!-- Przyciski do kolejnych kroków (ukryte na start) -->
                <button id="btn-roles" class="action-btn hidden">Wylosuj Linie</button>
                <button id="btn-champs" class="action-btn hidden">Wylosuj Postacie</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // KONFIGURACJA I ZMIENNE
        // ==========================================
        
        // Dostępne role (linie) na mapie
        const ROLES = ["Top", "Jungle", "Mid", "ADC", "Support"];
        
        // Zmienne przechowujące aktualny stan aplikacji
        let players = [];
        let blueTeam = [];
        let redTeam = [];

        // Pobieranie elementów interfejsu (HTML) do zmiennych, aby łatwo nimi zarządzać
        const inputsContainer = document.getElementById('inputs-container');
        const btnTeams = document.getElementById('btn-teams');
        const btnRoles = document.getElementById('btn-roles');
        const btnChamps = document.getElementById('btn-champs');
        
        const resultsArea = document.getElementById('results-area');
        const placeholderMsg = document.getElementById('placeholder-msg');
        const blueList = document.getElementById('blue-list');
        const redList = document.getElementById('red-list');

        // ==========================================
        // FUNKCJE POMOCNICZE
        // ==========================================

        // 1. Generowanie 10 pól do wpisania nicków przy starcie strony
        function createInputs() {
            for (let i = 1; i <= 10; i++) {
                const div = document.createElement('div');
                div.className = 'player-input-group';
                div.innerHTML = `
                    <label>${i}.</label>
                    <input type="text" id="player${i}" placeholder="Nick gracza ${i}..." />
                `;
                inputsContainer.appendChild(div);
            }
        }

        // 2. Funkcja mieszająca tablicę (algorytm Fisher-Yates) - zapewnia 100% losowości
        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                // Zamiana miejscami
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // 3. Funkcja wyświetlająca drużyny na ekranie (aktualizuje HTML)
        function renderTeams() {
            // Czyszczenie aktualnych list HTML
            blueList.innerHTML = '';
            redList.innerHTML = '';

            // Funkcja pomocnicza generująca HTML pojedynczego gracza
            const generatePlayerHTML = (player) => {
                let html = `<span class="player-name">${player.name}</span><div class="player-details">`;
                if (player.role) {
                    html += `<span class="player-role">${player.role}</span>`;
                }
                if (player.champion) {
                    // Jeśli ma postać, dodajemy ją za rolą
                    html += `<span class="player-champ">${player.role ? '|' : ''} ${player.champion}</span>`;
                }
                html += `</div>`;
                return `<li>${html}</li>`;
            };

            // Dodawanie graczy do listy Niebieskich
            blueTeam.forEach(player => {
                blueList.innerHTML += generatePlayerHTML(player);
            });

            // Dodawanie graczy do listy Czerwonych
            redTeam.forEach(player => {
                redList.innerHTML += generatePlayerHTML(player);
            });
        }

        // ==========================================
        // GŁÓWNA LOGIKA - OBSŁUGA PRZYCISKÓW
        // ==========================================

        // KROK 2: LOSOWANIE SKŁADÓW (Podział na 2 drużyny)
        btnTeams.addEventListener('click', () => {
            players = []; // Resetowanie listy w razie ponownego kliknięcia

            // Zbieranie nicków ze wszystkich 10 pól
            for (let i = 1; i <= 10; i++) {
                let name = document.getElementById(`player${i}`).value.trim();
                // Jeśli ktoś nie wpisał nicku, dajemy mu domyślny "Gracz X"
                if (name === "") name = `Gracz ${i}`;
                
                // Tworzymy obiekt gracza (na początku nie ma roli ani postaci)
                players.push({ name: name, role: null, champion: null });
            }

            // Losowe mieszanie listy graczy
            const shuffledPlayers = shuffleArray(players);

            // Podział graczy: pierwsi 5 to Niebiescy, kolejni 5 to Czerwoni
            blueTeam = shuffledPlayers.slice(0, 5);
            redTeam = shuffledPlayers.slice(5, 10);

            // Aktualizacja wyglądu (ukrywamy komunikat startowy, pokazujemy wyniki)
            placeholderMsg.classList.add('hidden');
            resultsArea.classList.remove('hidden');
            
            // Renderowanie HTML
            renderTeams();

            // Zarządzanie przyciskami (pokazujemy Krok 3, ukrywamy Krok 4 i resetujemy jego stan w razie ponownego losowania)
            btnRoles.classList.remove('hidden');
            btnRoles.classList.add('fade-in');
            
            btnChamps.classList.add('hidden');
            btnChamps.disabled = false;
            btnChamps.innerText = "Wylosuj Postacie";
        });

        // KROK 3: LOSOWANIE LINII (Ról w grze)
        btnRoles.addEventListener('click', () => {
            // Mieszamy pulę 5 ról niezależnie dla każdej z drużyn
            const blueRoles = shuffleArray(ROLES);
            const redRoles = shuffleArray(ROLES);

            // Przypisywanie wylosowanych ról graczom
            blueTeam.forEach((player, index) => {
                player.role = blueRoles[index];
            });

            redTeam.forEach((player, index) => {
                player.role = redRoles[index];
            });

            // Aktualizacja widoku
            renderTeams();

            // Ukrywamy przycisk ról i pokazujemy kolejny krok: Losowanie Postaci
            btnRoles.classList.add('hidden');
            
            btnChamps.classList.remove('hidden');
            btnChamps.classList.add('fade-in');
        });

        // KROK 4: POBIERANIE Z API I LOSOWANIE POSTACI (Championów)
        // Słowo 'async' oznacza, że funkcja wykonuje zapytania do internetu w tle
        btnChamps.addEventListener('click', async () => {
            // Zabezpieczenie przed wielokrotnym klikaniem podczas ładowania
            btnChamps.disabled = true;
            btnChamps.innerText = "Pobieranie danych z API Riot...";

            try {
                // Krok 4.1: Pobranie najnowszego numeru Patcha (wersji gry)
                const versionResponse = await fetch('https://ddragon.leagueoflegends.com/api/versions.json');
                const versions = await versionResponse.json();
                const latestPatch = versions[0]; // Pierwszy element to najnowszy patch

                // Krok 4.2: Pobranie aktualnej listy postaci dla tej konkretnej wersji w języku polskim
                const champsResponse = await fetch(`https://ddragon.leagueoflegends.com/cdn/${latestPatch}/data/pl_PL/champion.json`);
                const champsData = await champsResponse.json();
                
                // champsData.data to obiekt, wyciągamy z niego tylko nazwy postaci do tablicy
                const allChampions = Object.values(champsData.data).map(champ => champ.name);

                // Mieszamy pulę wszystkich postaci (ponad 160)
                const shuffledChampions = shuffleArray(allChampions);

                // Przypisujemy unikalne postacie każdemu z 10 graczy
                // Używamy indeksów od 0 do 4 dla Niebieskich i od 5 do 9 dla Czerwonych
                blueTeam.forEach((player, index) => {
                    player.champion = shuffledChampions[index];
                });

                redTeam.forEach((player, index) => {
                    player.champion = shuffledChampions[index + 5];
                });

                // Aktualizacja widoku z wylosowanymi postaciami
                renderTeams();
                
                // Koniec procesu - ukrywamy przycisk
                btnChamps.classList.add('hidden');

            } catch (error) {
                // W razie problemu z internetem lub API
                console.error("Wystąpił błąd podczas pobierania danych:", error);
                btnChamps.innerText = "Błąd pobierania! Spróbuj ponownie.";
                btnChamps.disabled = false; // Pozwalamy kliknąć jeszcze raz
            }
        });

        // ==========================================
        // START APLIKACJI
        // ==========================================
        // Tworzymy pola tekstowe od razu po załadowaniu skryptu
        createInputs();

    </script>
</body>
</html>
